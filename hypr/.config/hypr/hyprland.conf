# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = MOZ_ENABLE_WAYLAND,1

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

monitor = desc:ASUSTek COMPUTER INC VA279HG T7LMQS023914, 1920x1080@60, 1920x0, 1
monitor = desc:ASUSTek COMPUTER INC VA279HG T7LMQS023490, 1920x1080@60, 0x0, 1
monitor = desc:LG Electronics LG TV 0x01010101, 1920x1080@60, 0x0, 1
monitor = desc:AU Optronics 0xC1A5 0x0000C1A5, preferred, auto, 1.25

bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/lid.sh
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/lid.sh
exec-once = ~/.config/hypr/scripts/monitor-hotplug-daemon.sh

# Trigger: Lid is Closed
#bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-2, disable"
#bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off eDP-2

# Trigger: Lid is Opened
#bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-2, preferred, auto, 1"
#bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on eDP-2

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
$menu = wofi --show drun -n


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprpaper
exec-once = $terminal
exec-once = waybar
exec-once = nm-applet &


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = __GL_VRR_ALLOWED,1


