add_newline = false
# A minimal left prompt
format = """$directory$character"""
palette = "catppuccin_mocha"
# Safe right prompt: keep useful side details, but do NOT use `$all` here.
# Keep gcloud/cloud out because it reintroduced zsh/tmux/Ghostty cursor corruption.
right_format = """$git_branch$git_status$git_metrics$package$nodejs$bun$python$rust$golang$cmd_duration$jobs$status$time"""
command_timeout = 1000

# [directory.substitutions]
# '~/tests/starship-custom' = 'work-project'

# Replace the '❯' symbol in the prompt with '➜'
# [character] # The name of the module we are configuring is 'character'
# success_symbol = '[➜](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'
[git_status]
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
staged = '[++\($count\)](green)'

[git_metrics]
added_style = 'bold blue'
deleted_style = 'bold red'
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_commit]
commit_hash_length = 4
# tag_symbol = '🔖 '

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
style = 'bold blue'
symbol = "  "
# detect_files = ['aws']
disabled = true

[nodejs]
format = '[ $version](bold green) '
# Show only when Node context is active (Starship's defaults already detect JS/TS files,
# package.json, .node-version, .nvmrc, node_modules, etc.).

[golang]
format = '[ ](bold cyan)'

[docker_context]
disabled = true

# Disabled because adding the cloud/gcloud module to the right prompt reintroduced
# zsh/tmux/Ghostty cursor corruption, even without account/email text.
[gcloud]
format = 'on [$symbol]($style) '
symbol = '☁️ '
style = 'bold blue'
disabled = true

[hostname]
ssh_only = false
format = '[$ssh_symbol](bold blue) on [$hostname](bold red) '
trim_at = '.companyname.com'
disabled = true

